name: Continuous Integration

# Sürekli Entegrasyon / Continuous Integration
# main dalina her push ve PR'de otomatik derleme + test.
# Automatic build + test on every push/PR to main.
#
# BU DOSYAYI DUZENLEMENIZE GEREK YOK. Servis listesi repo degiskeni SERVICES'tan okunur.
# NO NEED TO EDIT THIS FILE. The service list is read from the SERVICES repo variable.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

# En az yetki / least privilege: derleme/test/artifact icin sadece okuma yeterli
# Only read access is needed for build/test/artifact
permissions:
  contents: read

jobs:
  build-test:
    # Guvenlik: fork'tan gelen PR'lar kalici self-hosted runner'da CALISTIRILMAZ.
    # Guvenilmeyen kod (secrets'a ve production agina yakin) runner'da kosmamali.
    # Ayni repodan gelen PR'lar ve main'e push'lar normal calisir.
    # Security: PRs from forks are NOT run on the persistent self-hosted runner.
    # Untrusted code must not execute near secrets/production. Same-repo PRs and
    # pushes to main run as usual.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/reusable-dotnet-build.yml
    with:
      configuration: Release
      # Sadece main'e push'ta artifact uret / build artifacts only on push to main
      upload_artifact: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      # Servisler repo degiskeninden / services from the repo variable
      services: ${{ vars.SERVICES }}
      # Artifact adi deploy ile ayni olmali (ci_artifact indirmesi bu ada bakar)
      # Artifact name must match deploy (the ci_artifact download looks it up by this name)
      artifact_name: ${{ vars.ARTIFACT_NAME || 'app-publish' }}
